<!DOCTYPE html>
<html>
<head>
  <title>AR Pizza Demo</title>

  <script type="module"
  src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body{
      margin:0;
      background:#f5f5f5;
      font-family:Arial;
    }

    h1{
      text-align:center;
      padding:20px;
    }

    model-viewer{
      width:100%;
      height:80vh;
    }
  </style>

</head>
<body>

<h1>AR Pizza Demo</h1>

<model-viewer
src="pizza.glb"
ar
camera-controls
auto-rotate
shadow-intensity="1">
</model-viewer>

</body>
</html>
