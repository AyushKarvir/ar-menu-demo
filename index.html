<!DOCTYPE html>
<html>
<head>
  <title>AR Pizza Demo</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body{
      margin:0;
      background:#f5f5f5;
      font-family:Arial;
    }

    model-viewer{
      width:100vw;
      height:100vh;
    }
  </style>
</head>

<body>

<model-viewer
  src="pizza.glb"
  ar
  ar-modes="webxr scene-viewer quick-look"
  camera-controls
  auto-rotate
  shadow-intensity="2"
  environment-image="neutral"
  scale="1 1 1"
  exposure="1"
  loading="eager">
</model-viewer>

</body>
</html>
